# Scope allowlist — scanning anything not listed here is refused.
allowlist:
  - juiceshop
  - dvwa
  - webgoat
  - bwapp

targets:
  juiceshop:
    base_url: "http://juiceshop:3000"
    tech: "Node.js / Angular SPA"
    auth:
      type: "json"
      login_url: "http://juiceshop:3000/rest/user/login"
      username: "admin@juice-sh.op"
      password: "admin123"
      username_field: "email"
      password_field: "password"
      token_path: "authentication.token"
    seed_urls:
      - "http://juiceshop:3000/rest/products/search?q=test"
      - "http://juiceshop:3000/api/Users"
      - "http://juiceshop:3000/rest/user/whoami"
  dvwa:
    base_url: "http://dvwa:80"
    tech: "PHP / MySQL"
    auth:
      type: "form"
      login_url: "http://dvwa:80/login.php"
      username: "admin"
      password: "password"
      username_field: "username"
      password_field: "password"
      extra_fields:
        Login: "Login"
      csrf_field: "user_token"
      logged_in_indicator: "Logout"
    seed_urls:
      - "http://dvwa:80/vulnerabilities/sqli/?id=1&Submit=Submit"
      - "http://dvwa:80/vulnerabilities/xss_r/?name=test"
      - "http://dvwa:80/vulnerabilities/exec/"
      - "http://dvwa:80/vulnerabilities/fi/?page=include.php"
  webgoat:
    base_url: "http://webgoat:8080/WebGoat"
    tech: "Java / Spring"
  bwapp:
    base_url: "http://bwapp:80"
    tech: "PHP / MySQL"
    auth:
      type: "form"
      login_url: "http://bwapp:80/login.php"
      username: "bee"
      password: "bug"
      username_field: "login"
      password_field: "password"
      extra_fields:
        security_level: "0"
        form: "submit"
      logged_in_indicator: "Logout"
